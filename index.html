<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <script src="./script.js" defer></script>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <div class="card">
          <form class="add-book" action="http://httpbin.org/post" method="post">
            <label for="title">Title</label><br>
            <input type="text" id="title" name="title"><br>
            <label for="author">Author</label><br>
            <input type="text" id="author" name="author"><br>
            <label for="pages">Number of Pages</label><br>
            <input type="text" id="pages" name="pages"><br>
            <div class="radioButtons">
              <input type="radio" id="haveRead" name="haveRead" value=true>
              <label for="haveRead">Read</label>
              <input type="radio" id="haveNotRead" name="haveRead" value=false>
              <label for="haveNotRead">Haven't Read</label>
            </div>
            <input type="submit" value="Add Book">
          </form>
        </div>
    </div>
</body>
</html>
